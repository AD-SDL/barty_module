node_name: barty
node_id: 01JPNF3ZJCZPDT2YFXPD10538C
node_description: MADSci node for controlling Barty, the Bartending Robot
node_type: device
module_name: barty
module_version: 0.0.1
capabilities:
  get_info: true
  get_state: true
  get_status: true
  send_action: true
  get_action_status: true
  get_action_result: true
  get_action_history: true
  action_files: true
  send_admin_commands: true
  set_config: true
  get_resources: false
  get_log: true
  admin_commands:
  - cancel
  - lock
  - pause
  - reset
  - resume
  - safety_stop
  - shutdown
  - unlock
node_url: null
actions:
  fill_all:
    name: fill_all
    description: Refills the specified amount of liquid from all motors
    args:
      amount:
        name: amount
        description: Amount of liquid to fill, in milliliters
        argument_type: float
        required: false
        default: 10
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
  drain_all:
    name: drain_all
    description: Drains specified amount of liquid from all motors
    args:
      amount:
        name: amount
        description: Amount of liquid to drain, in milliliters
        argument_type: float
        required: false
        default: 10
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
  fill:
    name: fill
    description: Refills the specified amount of liquid on target pumps
    args:
      pumps:
        name: pumps
        description: Pumps to refill with
        argument_type: List[int]
        required: true
        default: null
      amount:
        name: amount
        description: Amount of ink to fill, in milliliters
        argument_type: float
        required: false
        default: 5
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
  drain:
    name: drain
    description: Drains the specified amount of liquid from target pumps
    args:
      pumps:
        name: pumps
        description: Pumps to drain from
        argument_type: List[int]
        required: true
        default: null
      amount:
        name: amount
        description: Amount of ink to drain, in milliliters
        argument_type: float
        required: false
        default: 5
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
config:
  node_definition: definitions/barty.node.yaml
  node_info_path: null
  update_node_files: true
  status_update_interval: 2.0
  state_update_interval: 2.0
  node_url: http://kirby.cels.anl.gov:8000/
  uvicorn_kwargs: {}
  consumable_name_map:
  - Red Ink
  - Blue Ink
  - Yellow Ink
  - Black Ink
  simulate: false
config_schema:
  description: Configuration for Barty the bartender robot.
  properties:
    node_definition:
      anyOf:
      - type: string
      - format: path
        type: string
      - type: 'null'
      default: default.node.yaml
      description: Path to the node definition file to use. If set, the node will
        load the definition from this file on startup. Otherwise, a default configuration
        will be created.
      title: Node Definition File
    node_info_path:
      anyOf:
      - type: string
      - format: path
        type: string
      - type: 'null'
      default: null
      description: Path to export the generated node info file. If not set, will use
        the node name and the node_definition's path.
      title: Node Info Path
    update_node_files:
      default: true
      description: Whether to update the node definition and info files on startup.
        If set to False, the node will not update the files even if they are out of
        date.
      title: Update Node Files
      type: boolean
    status_update_interval:
      anyOf:
      - type: number
      - type: 'null'
      default: 2.0
      description: The interval in seconds at which the node should update its status.
      title: Status Update Interval
    state_update_interval:
      anyOf:
      - type: number
      - type: 'null'
      default: 2.0
      description: The interval in seconds at which the node should update its state.
      title: State Update Interval
    node_url:
      default: http://127.0.0.1:2000/
      description: The URL used to communicate with the node. This is the base URL
        for the REST API.
      format: uri
      minLength: 1
      title: Node URL
      type: string
    uvicorn_kwargs:
      description: Configuration for the Uvicorn server that runs the REST API.
      title: Uvicorn Configuration
      type: object
    consumable_name_map:
      default:
      - Red Ink
      - Blue Ink
      - Yellow Ink
      - Black Ink
      items:
        type: string
      title: Consumable Name Map
      type: array
    simulate:
      default: false
      title: Simulate
      type: boolean
  title: BartyNodeConfig
  type: object
